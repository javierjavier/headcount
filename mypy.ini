# Light type-check gate. Default (non-strict) mypy already checks annotated
# functions and their call sites — which is where a contract mismatch (e.g.
# passing a dict[int, int] where dict[str, int] is expected) bites — without
# auditing the numpy/insightface/PIL internals. So the payoff is high for the
# logic layer; we deliberately do NOT chase strict coverage of the model code.
#
# Run:  python -m mypy        (uses the files list below)
[mypy]
files = common.py, faces.py, enroll.py, tests/test_logic.py
# insightface, pillow_heif, sklearn, cv2, tqdm ship no type stubs.
ignore_missing_imports = True
